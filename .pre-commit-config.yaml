repos:
- repo: https://github.com/astral-sh/ruff-pre-commit
  rev: v0.15.18
  hooks:
    - id: ruff
      exclude: ^\.vulture_whitelist\.py$
    - id: ruff-format
      exclude: ^\.vulture_whitelist\.py$

- repo: https://github.com/pre-commit/mirrors-mypy
  rev: v2.1.0
  hooks:
    - id: mypy
      exclude: ^\.vulture_whitelist\.py$

- repo: local
  hooks:
    - id: pytest
      name: pytest
      entry: uv run pytest
      language: system
      pass_filenames: false
      always_run: true

- repo: https://github.com/Yelp/detect-secrets
  rev: v1.5.0
  hooks:
    - id: detect-secrets

- repo: local
  hooks:
    - id: pip-audit
      name: pip-audit
      entry: uv run pip-audit --local
      language: system
      pass_filenames: false

- repo: https://github.com/PyCQA/bandit
  rev: 1.9.4
  hooks:
    - id: bandit
      args: ["-c", "pyproject.toml"]

- repo: https://github.com/PyCQA/flake8
  rev: 7.3.0
  hooks:
    - id: flake8
      exclude: ^\.vulture_whitelist\.py$

- repo: https://github.com/pylint-dev/pylint
  rev: v4.0.6
  hooks:
    - id: pylint
      exclude: ^\.vulture_whitelist\.py$
      additional_dependencies:
        - streamlit
        - python-dotenv
        - langchain==1.3.9
        - langchain-community
        - langchain-core
        - langchain-text-splitters
        - langchain-huggingface
        - langchain-ollama
        - langchain-google-genai
        - langchain-openai
        - langchain-anthropic
        - langchain-groq
        - pymupdf4llm
        - pymupdf
        - pydantic
        - langchain-community

- repo: https://github.com/asottile/pyupgrade
  rev: v3.21.2
  hooks:
    - id: pyupgrade

- repo: https://github.com/jendrikseipp/vulture
  rev: v2.16
  hooks:
    - id: vulture
      args: ["--min-confidence=50", ".vulture_whitelist.py", "app.py", "utils/", "tests/"]
      exclude: |
        (^venv/.*)
        |(^rag-chatbot-env/.*)
        |(^\.venv/.*)
        |(^\.git/.*)
        |(^vectorstore/.*)
        |(^__pycache__/.*)
        |(^\.pytest_cache/.*)
        |(^\.ruff_cache/.*)
        |(^\.mypy_cache/.*)

- repo: https://github.com/returntocorp/semgrep
  rev: v1.165.0
  hooks:
    - id: semgrep
