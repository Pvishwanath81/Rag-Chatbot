stages:
  - lint
  - format
  - type_check
  - test
  - coverage

before_script:
  - pip install uv

lint:
  stage: lint
  image: python:3.12
  script:
    - uvx ruff check .

format:
  stage: format
  image: python:3.12
  script:
    - uvx ruff format --check .

type_check:
  stage: type_check
  image: python:3.12
  script:
    - uvx mypy .

test:
  stage: test
  image: python:3.12
  script:
    - pip install pytest langchain
    - pytest

coverage:
  stage: coverage
  image: python:3.12
  script:
    - pip install pytest pytest-cov langchain
    - pytest --cov=. --cov-report=xml